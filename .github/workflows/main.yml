name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install Dependencies
      run: npm ci

    - name: Run Linter
      run: npm run lint

    - name: Run Unit Tests
      run: npm run test

    - name: Build Project
      run: npm run build
      env:
        NEXT_PUBLIC_SITE_URL: https://github-actions-build.local
        NEXT_PUBLIC_SUPABASE_URL: "https://testing123.supabase.co"
        NEXT_PUBLIC_SUPABASE_ANON_KEY: "fake-key"
        RESEND_API_KEY: "testing_key"
